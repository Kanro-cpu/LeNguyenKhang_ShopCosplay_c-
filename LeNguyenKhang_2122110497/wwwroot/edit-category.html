<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Sửa Danh Mục</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/util.css">
</head>
<body class="animsition">
    <div class="container p-t-100">
        <div class="card p-4 shadow-sm">
            <h3 class="ltext-103 cl5 p-b-20">CẬP NHẬT DANH MỤC</h3>

            <div class="form-group p-b-15">
                <label class="stext-110 cl2">Tên danh mục</label>
                <input type="text" id="editCatName" class="form-control" placeholder="VD: Phụ kiện">
            </div>

            <div class="form-group p-b-20">
                <label class="stext-110 cl2">Đường dẫn (Slug)</label>
                <input type="text" id="editCatSlug" class="form-control" placeholder="VD: phu-kien">
            </div>

            <div class="flex-w">
                <button class="btn btn-success m-r-10" onclick="updateCategory()">Lưu thay đổi</button>
                <a href="admin.html" class="btn btn-secondary">Quay lại</a>
            </div>
        </div>
    </div>

    <script>
        // 1. Lấy ID từ thanh địa chỉ (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get('id');

        // 2. Load dữ liệu cũ lên ngay khi vào trang
        async function loadOldCategoryData() {
            try {
                const response = await fetch(`https://localhost:7064/api/Category/${catId}`);
                const cat = await response.json();

                document.getElementById('editCatName').value = cat.name;
                document.getElementById('editCatSlug').value = cat.slug;
            } catch (error) {
                alert("Không tìm thấy danh mục này!");
            }
        }
        loadOldCategoryData();

        // 3. Gửi dữ liệu đã sửa về Backend
        async function updateCategory() {
            const catData = {
                Id: parseInt(catId),
                Name: document.getElementById('editCatName').value,
                Slug: document.getElementById('editCatSlug').value || document.getElementById('editCatName').value.toLowerCase().replace(/ /g, '-')
            };

            try {
                const response = await fetch(`https://localhost:7064/api/Category/${catId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(catData)
                });

                if (response.ok) {
                    alert("Cập nhật danh mục thành công!");
                    window.location.href = "admin.html"; // Sửa xong bay về trang admin
                } else {
                    alert("Lỗi khi cập nhật!");
                }
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
